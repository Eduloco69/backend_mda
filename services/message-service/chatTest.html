<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">

    <title>
        Chat Test
    </title>


    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>


    <style>

        body{
            font-family:Arial;
            margin:20px;
            max-width:900px;
        }


        button{
            padding:8px;
            margin:4px;
            cursor:pointer;
        }


        input{
            padding:8px;
        }


        #chat{

            margin-top:20px;

            border:1px solid #ccc;

            border-radius:8px;

            height:500px;

            overflow-y:auto;

            padding:20px;

            background:#fafafa;
        }


        .message{

            margin-bottom:12px;

            padding:10px;

            border-radius:8px;

            width:fit-content;

            max-width:70%;
        }


        .other{

            background:#ececec;
        }


        .mine{

            background:#d8f4d2;

            margin-left:auto;

            text-align:right;
        }


        .meta{

            font-size:12px;

            opacity:.6;

            margin-bottom:4px;
        }

    </style>

</head>


<body>


<h2>
    Chat realtime test
</h2>



<!-- LOGIN -->

<button onclick="loginEduardo()">
    Login Eduardo
</button>


<button onclick="loginJPerez()">
    Login JPerez
</button>


<hr>



<!-- BUSCAR TICKET -->

<input
    id="ticketInput"
    placeholder="Ticket ID"
    value="1"
>


<button onclick="openTicket()">
    Abrir ticket
</button>



<hr>



<!-- ENVIAR -->

<input
    id="messageInput"
    placeholder="Escribe mensaje..."
    style="width:400px"
>


<button onclick="sendMessage()">
    Enviar
</button>



<!-- CHAT -->

<div id="chat"></div>



<script>


const API = "http://192.168.100.9:5000"


let socket = null

let currentUser = null

let currentTicket = null



function clearChat(){

    document
        .getElementById("chat")
        .innerHTML = ""
}



function renderMessage(
    msg
){

    const chat =
        document.getElementById(
            "chat"
        )


    const mine =
        msg.usuario.userId
        ==
        currentUser


    const div =
        document.createElement(
            "div"
        )


    div.className =
        mine
        ? "message mine"
        : "message other"


    div.innerHTML = `

        <div class="meta">

            ${msg.usuario.nombre}

        </div>

        <div>

            ${msg.mensaje}

        </div>
    `


    chat.appendChild(
        div
    )


    chat.scrollTop =
        chat.scrollHeight
}



async function doLogin(
    email,
    password
){

    const response =
        await fetch(

            `${API}/auth/login`,

            {

                method:"POST",

                credentials:"include",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    email,
                    password
                })
            }
        )


    const data =
        await response.json()


    console.log(data)


    if(!response.ok){

        return
    }


    connectSocket()

    console.log(
        "login ok"
    )
}



async function loginEduardo(){

    currentUser = 1

    await doLogin(

        "ebravo@test.com",

        "Test1234!"
    )
}



async function loginJPerez(){

    currentUser = 2

    await doLogin(

        "jperez@test.com",

        "Test1234!"
    )
}




function connectSocket(){

    if(socket){

        socket.disconnect()
    }


    socket = io(
        API,
        {
            withCredentials:true
        }
    )


    socket.on(

        "connect",

        ()=>{

            console.log(
                "socket conectado"
            )


            if(currentTicket){

                console.log("joining room:",currentTicket)

                socket.emit("join_ticket",
                    {
                        ticketId:currentTicket
                    }
                )
            }
        }
    )


    socket.on(
        "new_message",
        (data)=>{

            console.log(
                "nuevo mensaje realtime:",
                data
            )
            renderMessage(
                data
            )
        }
    )
}

async function openTicket(){

    if(!socket){
        alert("Primero haz login")
        return
    }

    currentTicket = document.getElementById("ticketInput").value

    clearChat()

    socket.emit("join_ticket", { ticketId: currentTicket })
    console.log("joining room:", currentTicket)

    const response = await fetch(
        `${API}/message/${currentTicket}`,
        { credentials: "include" }
    )

    const data = await response.json()
    console.log(data)

    data.mensajes.forEach(msg => renderMessage(msg))
}




async function sendMessage(){


    if(!currentTicket){

        alert(
            "Abre un ticket"
        )

        return
    }



    const message =

        document
            .getElementById(
                "messageInput"
            )
            .value



    const formData =
        new FormData()


    formData.append(

        "ticketId",

        currentTicket
    )


    formData.append(

        "mensaje",

        message
    )



    const response =

        await fetch(

            `${API}/message`,

            {
                method:"POST",
                credentials:"include",
                body:formData
            }
        )


    console.log(
        await response.text()
    )



    document
        .getElementById(
            "messageInput"
        )
        .value = ""
}


</script>


</body>
</html>
